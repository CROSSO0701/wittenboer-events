<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Wittenboer Events — eventscherm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* Anton lokaal (werkt ook offline / vanaf USB) */
  @font-face {
    font-family: 'Anton';
    src: url('../fonts/Anton-Regular.ttf') format('truetype');
    font-weight: 400;
    font-display: swap;
  }

  :root {
    --dark: #1A242C;
    --dark-2: #2A3840;
    --teal: #157A8C;
    --teal-bright: #2BA3B8;
    --sand: #D9C5B2;
    --on-dark: #F5F5F6;
    --on-dark-muted: #AFC0C7;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--dark);
    overflow: hidden;
    cursor: none;
    font-family: 'Figtree', system-ui, sans-serif;
  }

  .stage {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(120% 90% at 50% 0%, #25323B 0%, var(--dark) 55%, #131B21 100%);
    display: grid;
    place-items: center;
  }

  /* ====== LICHTBUNDELS ====== */
  .beams { position: absolute; inset: 0; overflow: hidden; }
  .beam {
    position: absolute;
    top: -12vh;
    width: 9vw;
    height: 125vh;
    transform-origin: 50% 0%;
    opacity: 0;
    filter: blur(1.2vw);
    background: linear-gradient(180deg,
      rgba(217,197,178,0.50) 0%,
      rgba(217,197,178,0.16) 45%,
      rgba(217,197,178,0) 80%);
  }
  .beam--teal {
    background: linear-gradient(180deg,
      rgba(43,163,184,0.45) 0%,
      rgba(43,163,184,0.14) 45%,
      rgba(43,163,184,0) 80%);
  }
  .beam:nth-child(1) { left: 6%;  transform: rotate(14deg); }
  .beam:nth-child(2) { left: 24%; transform: rotate(7deg); }
  .beam:nth-child(3) { left: 46%; transform: rotate(0deg); width: 11vw; }
  .beam:nth-child(4) { left: 66%; transform: rotate(-7deg); }
  .beam:nth-child(5) { left: 84%; transform: rotate(-14deg); }

  .run .beam { animation: beamOn 1.4s var(--ease) forwards, beamSway 7s ease-in-out 1.4s infinite alternate; }
  .run .beam:nth-child(1) { animation-delay: .10s, 1.5s; }
  .run .beam:nth-child(2) { animation-delay: .30s, 1.7s; --sway: -1; }
  .run .beam:nth-child(3) { animation-delay: .00s, 1.4s; }
  .run .beam:nth-child(4) { animation-delay: .40s, 1.8s; --sway: -1; }
  .run .beam:nth-child(5) { animation-delay: .20s, 1.6s; }

  @keyframes beamOn {
    0%   { opacity: 0; }
    8%   { opacity: .9; }
    14%  { opacity: .12; }
    22%  { opacity: .75; }
    100% { opacity: .55; }
  }
  @keyframes beamSway {
    from { translate: -1.2vw 0; }
    to   { translate: 1.2vw 0; }
  }

  /* warme vloer-gloed */
  .floor {
    position: absolute; left: 0; right: 0; bottom: 0; height: 34vh;
    background: radial-gradient(60% 100% at 50% 100%, rgba(217,197,178,0.10) 0%, rgba(217,197,178,0) 70%);
    opacity: 0;
  }
  .run .floor { animation: fadeIn 2s var(--ease) .8s forwards; }

  /* ====== CONTENT ====== */
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    width: min(92vw, 170vh);
  }

  .lockup {
    display: inline-flex;
    align-items: center;
    gap: 1.6vw;
    opacity: 0;
    translate: 0 3vh;
  }
  .run .lockup { animation: rise 1.1s var(--ease) .7s forwards; }
  .lockup img { width: 7.2vw; height: auto; display: block; }
  .lockup .name {
    font-weight: 700;
    color: var(--on-dark);
    font-size: 3.2vw;
    line-height: 0.95;
    letter-spacing: -0.02em;
    text-align: left;
  }

  h1 {
    margin-top: 4.5vh;
    font-family: 'Anton', Impact, sans-serif;
    font-weight: 400;
    text-transform: uppercase;
    color: var(--on-dark);
    font-size: 9.5vw;
    line-height: 1.02;
    letter-spacing: 0.01em;
  }
  .h1-line { display: block; overflow: hidden; }
  .h1-line > span { display: block; translate: 0 110%; }
  .run .h1-line--1 > span { animation: slideUp 1s var(--ease) 1.15s forwards; }
  .run .h1-line--2 > span { animation: slideUp 1s var(--ease) 1.3s forwards; }

  /* kinetisch wisselwoord */
  .kinetic {
    color: var(--sand);
    display: inline-grid;
    overflow: hidden;
    vertical-align: top;
    text-align: center;
  }
  .kinetic .sizer { grid-area: 1 / 1; visibility: hidden; }
  .kinetic .word {
    grid-area: 1 / 1;
    translate: 0 110%;
    will-change: translate, opacity;
  }
  .kinetic .word.in  { animation: wordIn  .75s var(--ease) forwards; }
  .kinetic .word.out { animation: wordOut .55s var(--ease) forwards; }
  @keyframes wordIn  { from { translate: 0 110%; opacity: 0; } to { translate: 0 0; opacity: 1; } }
  @keyframes wordOut { from { translate: 0 0; opacity: 1; } to { translate: 0 -110%; opacity: 0; } }

  .sub {
    margin-top: 4vh;
    color: var(--on-dark-muted);
    font-size: 1.8vw;
    font-weight: 500;
    line-height: 1.5;
    opacity: 0;
    translate: 0 2.5vh;
  }
  .run .sub { animation: rise 1s var(--ease) 1.9s forwards; }

  .cta {
    margin-top: 5.5vh;
    display: inline-flex;
    align-items: center;
    gap: 2.2vw;
    opacity: 0;
    translate: 0 2.5vh;
  }
  .run .cta { animation: rise 1s var(--ease) 2.3s forwards; }
  .cta__btn {
    background: var(--teal);
    color: var(--on-dark);
    font-weight: 700;
    font-size: 1.9vw;
    padding: 1.4vw 3vw;
    border-radius: 999px;
    box-shadow: 0 0 0 0 rgba(43,163,184,0.45);
    animation: pulse 3.2s ease-in-out 3s infinite;
  }
  .cta__tel {
    font-family: 'Anton', Impact, sans-serif;
    color: var(--on-dark);
    font-size: 2.6vw;
    letter-spacing: 0.04em;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(43,163,184,0.40); }
    50%      { box-shadow: 0 0 0 1.1vw rgba(43,163,184,0); }
  }

  /* ====== MARQUEE ONDERIN ====== */
  .marquee {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    z-index: 3;
    border-top: 1px solid rgba(245,245,246,0.10);
    background: rgba(19,27,33,0.55);
    overflow: hidden;
    padding: 1.1vw 0;
    opacity: 0;
  }
  .run .marquee { animation: fadeIn 1.2s var(--ease) 2.6s forwards; }
  .marquee__track {
    display: flex;
    width: max-content;
    gap: 3.5vw;
    animation: scroll 28s linear infinite;
    font-family: 'Anton', Impact, sans-serif;
    text-transform: uppercase;
    font-size: 1.5vw;
    letter-spacing: 0.12em;
    color: var(--on-dark-muted);
    white-space: nowrap;
  }
  .marquee__track .dot { color: var(--sand); }
  @keyframes scroll { from { translate: 0 0; } to { translate: -50% 0; } }

  /* ====== GENERIEK ====== */
  @keyframes rise    { to { opacity: 1; translate: 0 0; } }
  @keyframes slideUp { to { translate: 0 0; } }
  @keyframes fadeIn  { to { opacity: 1; } }

  /* blackout voor loop-restart */
  .blackout {
    position: absolute; inset: 0; z-index: 9;
    background: #10171C;
    opacity: 0;
    pointer-events: none;
    transition: opacity .9s ease;
  }
  .fading .blackout { opacity: 1; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001s !important; animation-iteration-count: 1 !important; }
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="beams" aria-hidden="true">
      <div class="beam"></div>
      <div class="beam beam--teal"></div>
      <div class="beam"></div>
      <div class="beam beam--teal"></div>
      <div class="beam"></div>
    </div>
    <div class="floor" aria-hidden="true"></div>

    <div class="content">
      <div class="lockup">
        <img src="../logo/we-mark.png" alt="">
        <div class="name">wittenboer<br>events</div>
      </div>

      <h1>
        <span class="h1-line h1-line--1"><span>Wij regelen je</span></span>
        <span class="h1-line h1-line--2"><span>
          <span class="kinetic" id="kinetic">
            <span class="sizer">geluid.</span>
            <span class="word in">licht.</span>
          </span>
        </span></span>
      </h1>

      <p class="sub">Licht, geluid en podia voor bruiloften, bedrijfsfeesten en festivals.<br>Wij denken mee en regelen alles van A tot Z.</p>

      <div class="cta">
        <span class="cta__btn">wittenboerevents.nl</span>
        <span class="cta__tel">06 27 17 28 76</span>
      </div>
    </div>

    <div class="marquee" aria-hidden="true">
      <div class="marquee__track" id="track"></div>
    </div>

    <div class="blackout"></div>
  </div>

<script>
  // ---- marquee vullen ----
  var items = ['Licht', 'Geluid', 'Podia', 'Showpakketten', 'Drive-ins', 'Festivals', 'Bruiloften', 'Bedrijfsfeesten'];
  var half = items.map(function (t) { return t + ' <span class="dot">&middot;</span>'; }).join(' ');
  document.getElementById('track').innerHTML = half + ' ' + half;

  // ---- kinetisch woord ----
  var WORDS = ['licht.', 'geluid.', 'podium.', 'crew.'];
  var WIDEST = 'podium.';
  var kinetic = document.getElementById('kinetic');
  var idx = 0, swapTimer = null;

  function setSizer() {
    kinetic.querySelector('.sizer').textContent = WIDEST;
  }

  function swapWord() {
    var current = kinetic.querySelector('.word.in');
    if (current) { current.className = 'word out'; }
    idx = (idx + 1) % WORDS.length;
    var next = document.createElement('span');
    next.className = 'word in';
    next.textContent = WORDS[idx];
    kinetic.appendChild(next);
    // opruimen
    kinetic.querySelectorAll('.word.out').forEach(function (el, i, all) {
      if (all.length > 1 && i < all.length - 1) el.remove();
    });
    setTimeout(function () {
      kinetic.querySelectorAll('.word.out').forEach(function (el) { el.remove(); });
    }, 600);
  }

  // ---- master-loop ----
  var stage = document.getElementById('stage');
  var LOOP = 19000;       // totale cyclus
  var WORD_EVERY = 2600;  // wisselsnelheid
  var WORD_START = 2300;  // eerste wissel na intro

  function startCycle() {
    stage.classList.remove('fading');
    stage.classList.add('run');
    idx = 0;
    kinetic.innerHTML = '<span class="sizer"></span><span class="word in">' + WORDS[0] + '</span>';
    setSizer();

    var t = WORD_START;
    var timers = [];
    while (t < LOOP - 2200) {
      timers.push(setTimeout(swapWord, t));
      t += WORD_EVERY;
    }
    timers.push(setTimeout(function () { stage.classList.add('fading'); }, LOOP - 1100));
    timers.push(setTimeout(function () {
      stage.classList.remove('run');
      // reflow forceren zodat alle animaties resetten
      void stage.offsetWidth;
      startCycle();
    }, LOOP));
  }

  // fullscreen op klik/tik (handig op het scherm zelf)
  document.addEventListener('click', function () {
    if (document.fullscreenElement) return;
    document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
  });

  startCycle();
</script>
</body>
</html>
